<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday your_name!</title>
    <!-- style sheet -->
    <link rel="stylesheet" type="text/css" href="index_styles.css">
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <!-- bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">   
    <!-- bootstrap css and js -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script> -->
    <!-- flag-icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <!-- my js script -->
    <script src="index_script.js" defer></script>
</head>
<body>

    <div id="navbar" class="grey">
        <!-- <i id="hamburger_button" class="bi bi-list"></i> -->
        <h1 id="title_text">Happy Birthday [your_name]!</h1>
        <!-- <i id="speaker_on" class="bi bi-volume-up-fill speaker_button"></i>
        <i id="speaker_off" class="bi bi-volume-mute-fill speaker_button"></i> -->
    </div>

    <div id="body_container">
        <div id="your_name_container" class="your_input_containers">
            <input id="your_name_text" class="your_imput" placeholder="Enter your name" type="text" enterkeyhint="done" />
        </div>

        <div id="your_age_container" class="your_input_containers">
            <input id="your_age_text" class="your_imput" placeholder="Enter your age" type="text" enterkeyhint="done" />
        </div>

        <div id="your_favorite_container" class="your_input_containers">
            <input id="your_favorite_text" class="your_imput" placeholder="Enter your favorite thing" type="text" enterkeyhint="done" />
        </div>

        <div id="birthday_elements">
            <div id="birthday_title">Let me wish you Happy Birthday...</div>
            
            <div id="birthday_buttons">
                <button id="play_english_en-GB" class="play_language_button">In English</button>
                <button id="play_spanish_es-ES" class="play_language_button">En español</button>
                <button id="play_french_fr-FR" class="play_language_button">En français</button>
                <button id="play_french_it-IT" class="play_language_button">In italiano</button>
                <button id="play_chinese_zh-CN" class="play_language_button">中文里的</button>
            </div>

            <div id="birthday_age">You don't look a day over [age_minus_10]</div>

            <div id="birthday_favorite">I hope you get a lot of [favorite_thing] today!</div>
        </div>

    </div>

</body>
</html>
